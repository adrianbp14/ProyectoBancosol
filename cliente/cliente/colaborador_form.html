<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta Colaborador - BancoSol</title>
    <link rel="stylesheet" href="css/colaboradores.css">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <h1>Alta de Entidad Colaboradora</h1>
            <nav>
                <button id="btn-volver-inicio" class="btn-nav">Volver al Inicio</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="card">
            <h2>Datos de la Entidad</h2>
            <p style="margin-bottom: 25px;">Rellena los datos para registrar un nuevo colaborador. El estado inicial será "Pendiente".</p>

            <div id="mensajeAlerta" class="alert" style="display: none;"></div>

            <form id="formularioColaborador">

                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="nombre">Nombre de la Entidad / Organización *</label>
                        <input type="text" id="nombre" class="form-control" required placeholder="Ej: Ayuntamiento de Almáchar">
                    </div>
                    
                    <div class="form-group">
                        <label for="codigo">Código BancoSol</label>
                        <input type="text" id="codigo" class="form-control" placeholder="Ej: A0362">
                    </div>
                    
                    <div class="form-group checkbox-group" style="padding-top: 35px;">
                        <input type="checkbox" id="vinculado">
                        <label for="vinculado" style="margin:0;">Entidad Vinculada a BancoSol</label>
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="domicilio">Domicilio / Dirección física</label>
                        <input type="text" id="domicilio" class="form-control" placeholder="Calle, número, portal...">
                    </div>
                    
                    <div class="form-group">
                        <label for="localidad">Localidad</label>
                        <input type="text" id="localidad" class="form-control" placeholder="Ej: Rincón de la Victoria">
                    </div>
                    
                    <div class="form-group">
                        <label for="cpostal">Código Postal</label>
                        <input type="text" id="cpostal" class="form-control" maxlength="5" placeholder="Ej: 29730">
                    </div>
                    
                    <div class="form-group">
                        <label for="voluntarios">Nº Voluntarios Estimado</label>
                        <input type="number" id="voluntarios" class="form-control" placeholder="Ej: 15">
                    </div>
                </div>

                <hr style="border: 0; border-top: 1px solid #ddd; margin: 30px 0;">

                <h2>Personas de Contacto (Máx. 3)</h2>
                <p style="margin-bottom: 20px;">Añade a las personas responsables de esta entidad.</p>
                
                <div id="contactosContainer">
                    </div>

                <button type="button" id="btnAñadirContacto" class="btn-add">+ Añadir Persona de Contacto</button>

                <div style="margin-top: 20px; text-align: right;">
                    <button type="submit" class="btn-submit">Guardar Colaborador</button>
                </div>
            </form>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/colaborador_form.js"></script>
    <script src="js/navegacion.js"></script>
</body>
</html>
