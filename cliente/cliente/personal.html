<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Perfil - BancoSol</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/admin.css">

    <script src="js/auth-common.js" defer></script>
    <script src="js/worker.js" defer></script>
    <script src="js/personal.js" defer></script>
</head>

<body>

<div class="dashboard-wrapper">

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>BancoSol</h2>
            <p>Administración</p>
        </div>

        <nav class="sidebar-nav">
            <a id="btn-inicio-perfil" style="cursor: pointer;">
                <span>🏠</span> Inicio
            </a>
            <a href="personal.html" class="active">
                <span>👤</span> Personal
            </a>
        </nav>

        <div class="sidebar-footer">
            <button id="btn-cierre-sesion">Cerrar sesión</button>
        </div>
    </aside>

    <main class="main-content">

        <header class="header top-header-modern">
            <h1>Información del Usuario</h1>
            <div id="nombre-usuario" class="user-info">Cargando...</div>
        </header>

        <div class="cards-grid" style="max-width: 500px; margin-top: 20px;">
            <div class="dash-card" style="text-align: left; cursor: default; width: 100%;">
                <h3>Mis Datos de Perfil</h3>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">

                <p><strong>ID de Usuario:</strong> <span id="perfil-id">-</span></p>
                <p><strong>Nombre Completo:</strong> <span id="perfil-username">-</span></p>
                <p><strong>Puesto / Rol:</strong> <span id="perfil-puesto">-</span></p>
            </div>
        </div>

        <footer class="admin-footer">
            <p>&copy; 2026 BancoSol. Todos los derechos reservados.</p>
        </footer>
    </main>

</div>9

</body>
</html>
