<!--
**HTML** — a plain form with two labelled inputs and a submit button. 
A `<p id="message">` below the form is used to show feedback to the user.

**JavaScript** — a single `submit` event listener that:
1. Prevents the default form submission with `e.preventDefault()`
2. Reads both field values and `POST`s them as JSON to the API
3. On a successful response (`200 OK` + a `token` in the body), 
stores the JWT in `sessionStorage` and displays it — uncomment the 
`window.location.href` line to redirect to your app
4. On a failed response (wrong credentials, `401`, etc.), shows the 
error message returned by the server
5. On a network error (server unreachable), catches the exception and 
shows a plain error string

The only line you need to change before using it is:

```js
const API_ENDPOINT = 'http://localhost:3000/auth/login';
```
-->

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio de sesión</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/api.js" defer></script>
  <script src="js/index.js" defer></script>
</head>
<body>

<form id="login-form">
  <h1>Inicio de sesión</h1>

  <label for="username">Nombre de usuario</label>
  <input type="text" id="username" name="username" placeholder="Tu usuario" required />

  <label for="password">Contraseña</label>
  <div class="password-wrapper">
    <input type="password" id="password" name="password" placeholder="••••••••" required />
    <button type="button" id="toggle-password" aria-label="Mostrar contraseña">
      👁️
    </button>
  </div>

  <button type="submit">Entrar</button>

  <p id="message"></p>
</form>

</body>
</html>
