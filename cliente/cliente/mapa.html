<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Tiendas | Localizador</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Google Fonts para un look moderno -->
    <link rel="stylesheet" href="css/mapa.css">
</head>
<body>

<div class="container">
    <header>
        <h1>📍 Localización de Tiendas</h1>
        <p>Gestiona y visualiza los puntos de venta en tiempo real</p>
    </header>

    <div class="search-container">
        <div class="input-group">
            <label for="busquedaNombre"></label><input type="text" id="busquedaNombre" placeholder="Buscar por nombre de tienda...">
        </div>
        <div class="input-group">
            <label for="busquedaCP"></label><input type="text" id="busquedaCP" placeholder="Código Postal (ej: 28001)">
        </div>
        <button id="btnLimpiar" class="btn-secondary">Limpiar Filtros</button>
        <button id="btn-volver-inicio" class="btn-nav">Volver al Inicio</button>
    </div>

    <div id="map-wrapper">
        <div id="map"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/api.js" defer></script>
<script src="js/auth-common.js" defer></script>
<script src="js/mapa.js" defer></script>
<script src="js/navegacion.js"></script>
</body>
</html>
