<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancosol - Personal de Logística</title>
    <link rel="stylesheet" href="css/logistica.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <h1>Personal de Logística</h1>
            <nav>
                <button id="btn-volver-inicio" class="btn-nav">Volver al Inicio</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>Listado de Coordinadores y Capitanes</h2>
                <button class="btn-confirm" onclick="abrirModalCrear()">+ Añadir Nuevo</button>
            </div>
            
            <p>Mantenimiento de datos del personal encargado de la logística.</p>
            
            <div class="form-group" style="margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd;">
                <label for="filtro-rol" style="font-weight: bold; margin-right: 10px;">Ver:</label>
                <select id="filtro-rol" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc; width: 250px;">
                    <option value="todos">Todos</option>
                    <option value="coordinadores">Solo Coordinadores</option>
                    <option value="capitanes">Solo Capitanes</option>
                </select>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Rol</th>
                            <th>Entidad</th>
                            <th>Teléfono / Área</th>
                            <th>Correo Electrónico</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-personal">
                        <tr>
                            <td colspan="6" style="text-align:center;">Conectando con el servidor...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="modal-personal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModalPersonal()">&times;</span>
            <h3 id="titulo-modal">Añadir Personal Logístico</h3>
            <hr>
            
            <input type="hidden" id="id-personal-modal">

            <div class="form-group">
                <label for="tipo-personal">Tipo de Perfil:</label>
                <select id="tipo-personal" onchange="toggleCamposEspecíficos()">
                    <option value="coordinador">Coordinador</option>
                    <option value="capitan">Capitán</option>
                </select>
            </div>

            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" id="input-nombre" placeholder="Ej. Juan" required>
            </div>

            <div class="form-group" id="grupo-apellidos">
                <label>Apellidos:</label>
                <input type="text" id="input-apellidos" placeholder="Ej. Pérez García">
            </div>

            <div class="form-group">
                <label>Teléfono:</label>
                <input type="text" id="input-telefono" placeholder="Ej. 600123456">
            </div>

            <div class="form-group">
                <label>Correo Electrónico:</label>
                <input type="email" id="input-email" placeholder="juan@ejemplo.com">
            </div>

            <div id="campos-coordinador">
                <div class="form-group">
                    <label>Entidad de Pertenencia:</label>
                    <input type="text" id="input-entidad" placeholder="Ej. BANCOSOL">
                </div>
            </div>

            <div class="form-group">
                <label>Localidad:</label>
                <select id="select-localidad">
                    <option value="">-- Selecciona Localidad --</option>
                </select>
            </div>

            <div class="form-group" id="grupo-distrito">
                <label>Distrito (Opcional):</label>
                <select id="select-distrito">
                    <option value="">-- Selecciona Distrito --</option>
                </select>
            </div>

            <div class="acciones-modal" style="margin-top: 20px;">
                <button class="btn-cancel" onclick="cerrarModalPersonal()">Cancelar</button>
                <button id="btn-guardar-personal" class="btn-confirm">Guardar</button>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/navegacion.js"></script>
    <script src="js/personal-logistica.js"></script>
</body>
</html>
